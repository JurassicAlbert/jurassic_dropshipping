name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze lib

      - name: Run tests
        run: flutter test

  build-web:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: flutter build web

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libsqlite3-dev libstdc++-14-dev lld llvm

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        run: flutter build linux

  admin-next-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin_next/package-lock.json

      - name: Install admin dependencies
        run: npm ci
        working-directory: admin_next

      - name: Lint admin
        run: npm run lint
        working-directory: admin_next

      - name: Unit/component/API tests
        run: npm run test
        working-directory: admin_next

      - name: Build admin
        run: npm run build
        working-directory: admin_next

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: admin_next

      - name: Start admin server
        run: |
          npx next start -p 3001 &
          npx wait-on http://127.0.0.1:3001
        working-directory: admin_next

      - name: E2E smoke
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001
        run: npm run test:e2e
        working-directory: admin_next
